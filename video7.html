<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOODSTREAM VIRAL</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #151515;
      font-family: sans-serif;
    }
  </style>
</head>

<body class="text-white">

  <!-- CONTAINER -->
  <div class="max-w-md mx-auto p-3">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <!-- LOGO -->
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7V-zd9Fe-iI4fuIcOLPJFX560R07ZqqRGp4IQ6r-GEg&s" class="mx-auto w-32 mb-2">

      <p class="text-gray-400 text-sm">DOODSTREAM VIRAL</p>
    </div>

    <!-- VIDEO CARD -->
    <div class="bg-zinc-900 rounded-xl p-3">

      <!-- VIDEO -->
      <video id="videoPlayer" controls class="w-full rounded-lg mb-3">
        <source id="videoSource" src="" type="video/mp4">
      </video>

      <!-- INFO -->
      <div class="text-sm mb-3">
        <p class="text-gray-300 break-all" id="fileName">video.mp4</p>
        <p class="text-gray-500 text-xs">video no ads</p>
      </div>

      <!-- DOWNLOAD BUTTON -->
      <a id="downloadBtn"
         href="https://ouo.io/rhhNXr"
         class="block text-center bg-gradient-to-r from-pink-500 to-red-500 py-2 rounded-lg font-medium">
        Download
      </a>

    </div>
  </div>

  <!-- SCRIPT GANTI VIDEO DI SINI -->
  <script>
    // 🔥 GANTI LINK VIDEO DI SINI SAJA
    const videoLink = " https://cdn.aceimg.com/9cf70e005.mp4";

    // ambil nama file otomatis
    const fileName = videoLink.split('/').pop();

    // set ke video player
    document.getElementById("videoSource").src = videoLink;
    document.getElementById("videoPlayer").load();

    // set nama file
    document.getElementById("fileName").innerText = fileName;

    // set tombol download
    document.getElementById("downloadBtn").href = videoLink;
  </script>

</body>
</html>
